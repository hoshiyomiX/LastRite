name: Smart Benchmark

on:
  schedule:
    - cron: '0 */6 * * *'  # Every 6 hours
  workflow_dispatch:

jobs:
  benchmark:
    name: Performance Check
    runs-on: ubuntu-latest
    timeout-minutes: 5
    
    steps:
      - uses: actions/checkout@v4
        with:
          ref: testing
      
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      
      - name: Run Benchmark
        run: |
          node << 'EOF'
          const https = require('https');
          const http = require('http');
          const fs = require('fs');
          
          // Config
          const DOMAINS = [
            'hoshiyomi.web.id',
            'hoshiyomi.qzz.io',
          ];
          
          const FALLBACK_WORKERS_DEV = 'last-rite.hoshiyomix.workers.dev';
          const TIMEOUT = 10000;
          const SAMPLES = 5;
          
          // Simple HTTP request dengan timeout
          function request(url, timeout = TIMEOUT) {
            return new Promise((resolve, reject) => {
              const start = Date.now();
              const urlObj = new URL(url);
              const client = url.startsWith('https') ? https : http;
              
              const req = client.get(url, {
                timeout,
                headers: {
                  'User-Agent': 'LastRite-Benchmark/2.0',
                  'Accept': '*/*'
                }
              }, (res) => {
                let data = '';
                const ttfb = Date.now() - start;
                
                res.on('data', chunk => data += chunk);
                res.on('end', () => {
                  resolve({
                    status: res.statusCode,
                    ttfb,
                    duration: Date.now() - start,
                    size: Buffer.byteLength(data),
                    headers: res.headers
                  });
                });
              });
              
              req.on('error', reject);
              req.on('timeout', () => {
                req.destroy();
                reject(new Error('Timeout'));
              });
            });
          }
          
          // Test latency dengan multiple samples
          async function testLatency(domain) {
            const results = [];
            
            for (let i = 0; i < SAMPLES; i++) {
              try {
                const res = await request(`https://${domain}/api/v1/myip`);
                results.push(res.ttfb);
              } catch (err) {
                // Silent fail, akan di-handle di summary
              }
              if (i < SAMPLES - 1) await new Promise(r => setTimeout(r, 200));
            }
            
            return results;
          }
          
          // Test download speed
          async function testDownload(domain) {
            try {
              const res = await request(`https://${domain}/api/v1/sub?cc=US,SG&limit=50&format=raw`);
              const speedMbps = ((res.size * 8) / (res.duration / 1000) / 1_000_000).toFixed(2);
              return {
                speedMbps: parseFloat(speedMbps),
                ttfb: res.ttfb,
                size: (res.size / 1024).toFixed(1),
                cache: res.headers['x-cache-status'] || 'UNKNOWN'
              };
            } catch (err) {
              return { error: err.message };
            }
          }
          
          // Stats calculation
          function calcStats(values) {
            if (values.length === 0) return null;
            
            const sorted = [...values].sort((a, b) => a - b);
            const avg = values.reduce((a, b) => a + b, 0) / values.length;
            const p50 = sorted[Math.floor(sorted.length * 0.5)];
            const p95 = sorted[Math.floor(sorted.length * 0.95)];
            const min = sorted[0];
            const max = sorted[sorted.length - 1];
            
            return { avg, p50, p95, min, max, samples: values.length };
          }
          
          // Health check + rating
          function evaluateHealth(latency, download) {
            if (!latency || !download || download.error) return '🔴 DOWN';
            
            const avgLatency = latency.avg;
            const p95Latency = latency.p95;
            const speedMbps = download.speedMbps;
            
            if (avgLatency < 100 && p95Latency < 200 && speedMbps > 5) return '🟢 EXCELLENT';
            if (avgLatency < 200 && p95Latency < 500 && speedMbps > 2) return '🟡 GOOD';
            if (avgLatency < 500 && p95Latency < 1000) return '🟠 DEGRADED';
            return '🔴 POOR';
          }
          
          // Main benchmark
          async function runBenchmark() {
            console.log('\n' + '='.repeat(60));
            console.log('LastRite Performance Benchmark');
            console.log('Timestamp:', new Date().toISOString());
            console.log('='.repeat(60) + '\n');
            
            const results = {};
            
            // Test custom domains (skip DNS pre-check)
            for (const domain of DOMAINS) {
              console.log(`Testing ${domain}...`);
              
              try {
                const latency = await testLatency(domain);
                const download = await testDownload(domain);
                
                results[domain] = {
                  latency: calcStats(latency),
                  download,
                  health: evaluateHealth(calcStats(latency), download)
                };
                
                console.log(`  ✓ ${results[domain].health}`);
              } catch (err) {
                console.log(`  ✗ Failed: ${err.message}`);
                results[domain] = { 
                  error: err.message, 
                  health: '🔴 DOWN' 
                };
              }
            }
            
            // Fallback test workers.dev
            console.log(`\nTesting fallback (${FALLBACK_WORKERS_DEV})...`);
            try {
              const latency = await testLatency(FALLBACK_WORKERS_DEV);
              const download = await testDownload(FALLBACK_WORKERS_DEV);
              
              results['workers.dev'] = {
                latency: calcStats(latency),
                download,
                health: evaluateHealth(calcStats(latency), download)
              };
              
              console.log(`  ✓ ${results['workers.dev'].health}`);
            } catch (err) {
              console.log(`  ✗ Failed: ${err.message}`);
              results['workers.dev'] = { 
                error: err.message, 
                health: '🔴 DOWN' 
              };
            }
            
            // Generate report
            const timestamp = new Date().toISOString().replace('T', ' ').slice(0, 19);
            const commit = process.env.GITHUB_SHA?.slice(0, 8) || 'local';
            
            let report = '\n' + '='.repeat(70) + '\n';
            report += `Benchmark: ${timestamp} UTC (${commit})\n`;
            report += '='.repeat(70) + '\n\n';
            
            for (const [domain, data] of Object.entries(results)) {
              const label = domain === 'workers.dev' ? `${FALLBACK_WORKERS_DEV} (fallback)` : domain;
              report += `${label}\n`;
              report += `  Status: ${data.health}\n`;
              
              if (data.error) {
                report += `  Error: ${data.error}\n`;
              } else {
                const lat = data.latency;
                const dl = data.download;
                
                if (lat) {
                  report += `  Latency: avg=${Math.round(lat.avg)}ms p50=${Math.round(lat.p50)}ms p95=${Math.round(lat.p95)}ms\n`;
                  report += `           range=${Math.round(lat.min)}-${Math.round(lat.max)}ms (${lat.samples} samples)\n`;
                }
                
                if (dl && !dl.error) {
                  report += `  Download: ${dl.speedMbps} Mbps (${dl.size} KB, TTFB ${dl.ttfb}ms)\n`;
                  report += `  Cache: ${dl.cache}\n`;
                }
              }
              
              report += '\n';
            }
            
            // Append to log
            fs.appendFileSync('benchmark.log', report);
            console.log('\n' + '='.repeat(60));
            console.log('✓ Benchmark complete');
            console.log('='.repeat(60) + '\n');
            
            // Output summary untuk GitHub Actions
            console.log('::group::Summary');
            for (const [domain, data] of Object.entries(results)) {
              console.log(`${domain}: ${data.health}`);
            }
            console.log('::endgroup::');
          }
          
          runBenchmark().catch(err => {
            console.error('\n✗ Fatal error:', err.message);
            process.exit(1);
          });
          EOF
      
      - name: Trim Log (Keep Last 20 Entries)
        run: |
          node << 'EOF'
          const fs = require('fs');
          if (!fs.existsSync('benchmark.log')) process.exit(0);
          
          const content = fs.readFileSync('benchmark.log', 'utf8');
          const entries = content.split(/={70}/g).filter(e => e.trim());
          
          if (entries.length > 20) {
            const keep = entries.slice(-20);
            fs.writeFileSync('benchmark.log', '=' .repeat(70) + keep.join('=' .repeat(70)));
            console.log(`Trimmed ${entries.length - 20} old entries`);
          }
          EOF
      
      - name: Commit Results
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add benchmark.log
          
          if ! git diff --staged --quiet; then
            git commit -m "benchmark: $(date -u +'%Y-%m-%d %H:%M UTC') [skip ci]"
            git push
          else
            echo "No changes to commit"
          fi
