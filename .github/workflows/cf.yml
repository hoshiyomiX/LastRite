name: ⛅ Deploy to Cloudflare Workers

on:
  workflow_dispatch:
  push:
    branches:
      - main
      - testing

jobs:
  validate:
    name: 🔍 Validate Worker Code
    runs-on: ubuntu-latest
    timeout-minutes: 10
    
    steps:
      - name: 📥 Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: 🥟 Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: 📦 Install dependencies
        run: bun install --frozen-lockfile

      - name: 🔍 Check JavaScript syntax
        run: |
          echo "::group::Syntax Check"
          node --check _worker.js
          echo "✅ Syntax check passed"
          echo "::endgroup::"

      - name: 📋 Check file integrity
        run: |
          echo "::group::File Integrity Check"
          
          # Check if file is complete (no truncation)
          if ! tail -1 _worker.js | grep -q '[;}]'; then
            echo "::error::_worker.js appears truncated (missing closing bracket/semicolon)"
            exit 1
          fi
          
          # Check file size (should be > 20KB for a complete worker)
          SIZE=$(stat -f%z _worker.js 2>/dev/null || stat -c%s _worker.js)
          if [ "$SIZE" -lt 20000 ]; then
            echo "::error::_worker.js file size too small ($SIZE bytes), possible truncation"
            exit 1
          fi
          
          echo "✅ File size: $SIZE bytes"
          echo "✅ File integrity check passed"
          echo "::endgroup::"

      - name: 🔬 Lint with ESLint (optional)
        continue-on-error: true
        run: |
          echo "::group::ESLint Check"
          if [ -f ".eslintrc.json" ] || [ -f ".eslintrc.js" ]; then
            bun run eslint _worker.js || echo "::warning::ESLint found issues (non-blocking)"
          else
            echo "::notice::No ESLint config found, skipping linting"
          fi
          echo "::endgroup::"

      - name: 🧪 Wrangler dry-run (syntax + config validation)
        run: |
          echo "::group::Wrangler Validation"
          bunx wrangler deploy --dry-run --outdir=./dist
          echo "✅ Wrangler dry-run passed"
          echo "::endgroup::"
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CF_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CF_ACCOUNT_ID }}

      - name: ✅ Validation complete
        run: |
          echo "::notice::✅ All validation checks passed!"
          echo "::notice::📄 File: _worker.js"
          echo "::notice::🌿 Branch: ${{ github.ref_name }}"
          echo "::notice::🚀 Ready for deployment"

  deploy:
    name: 🚀 Deploy Worker
    runs-on: ubuntu-latest
    timeout-minutes: 30
    needs: validate  # CRITICAL: Only deploy if validation passes
    
    steps:
      - name: 📥 Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: 🥟 Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: 📦 Install dependencies
        run: bun install --frozen-lockfile

      - name: 🧹 Clean Deployment - Delete existing worker
        continue-on-error: true
        run: |
          echo "::group::Pre-deployment Cleanup"
          echo "⚠️ Initiating clean deployment (5-10s downtime)"
          echo "🎯 Reason: Clear stale connection pools and global state"
          
          # Try to delete with retry mechanism
          MAX_RETRIES=3
          RETRY_COUNT=0
          
          while [ $RETRY_COUNT -lt $MAX_RETRIES ]; do
            echo "🔄 Attempt $((RETRY_COUNT + 1))/$MAX_RETRIES..."
            
            if bunx wrangler delete --force; then
              echo "✅ Worker deleted successfully"
              break
            else
              RETRY_COUNT=$((RETRY_COUNT + 1))
              if [ $RETRY_COUNT -lt $MAX_RETRIES ]; then
                echo "⏳ Retrying in 3 seconds..."
                sleep 3
              else
                echo "::warning::Failed to delete after $MAX_RETRIES attempts (worker may not exist)"
                echo "::notice::Proceeding with deployment..."
              fi
            fi
          done
          
          # Wait for deletion to propagate globally
          echo "⏳ Waiting 5 seconds for global propagation..."
          sleep 5
          
          echo "✅ Cleanup phase completed"
          echo "::endgroup::"
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CF_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CF_ACCOUNT_ID }}

      - name: 🚀 Deploy fresh worker instance
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CF_API_TOKEN }}
          accountId: ${{ secrets.CF_ACCOUNT_ID }}
          wranglerVersion: "4.55.0"
        env:
          GIT_COMMIT_ID: ${{ github.sha }}

      - name: ⏳ Wait for deployment propagation
        run: |
          echo "::group::Deployment Propagation"
          echo "⏳ Waiting 15 seconds for global edge deployment..."
          sleep 15
          echo "✅ Propagation wait completed"
          echo "::endgroup::"

      - name: 🔗 Auto-attach custom domains from list
        run: |
          echo "::group::Custom Domain Attachment"
          echo "🎯 Reading domains from .cloudflare/domains.txt..."
          
          DOMAINS_FILE=".cloudflare/domains.txt"
          
          if [ ! -f "$DOMAINS_FILE" ]; then
            echo "::error::Domains file not found: $DOMAINS_FILE"
            exit 1
          fi
          
          # Read domains, skip empty lines and comments
          DOMAINS=()
          while IFS= read -r line || [ -n "$line" ]; do
            # Trim whitespace
            line=$(echo "$line" | xargs)
            
            # Skip empty lines and comments
            if [ -z "$line" ] || [[ "$line" == \#* ]]; then
              continue
            fi
            
            DOMAINS+=("$line")
          done < "$DOMAINS_FILE"
          
          if [ ${#DOMAINS[@]} -eq 0 ]; then
            echo "::error::No domains found in $DOMAINS_FILE"
            exit 1
          fi
          
          echo "📋 Found ${#DOMAINS[@]} domains to process:"
          printf '  - %s\n' "${DOMAINS[@]}"
          echo ""
          
          SUCCESS_COUNT=0
          ALREADY_ATTACHED=0
          FAILED_COUNT=0
          FAILED_DOMAINS=()
          
          for domain in "${DOMAINS[@]}"; do
            echo "📌 Processing: $domain"
            
            # Try to add domain (idempotent operation)
            OUTPUT=$(bunx wrangler domains add "$domain" 2>&1 || true)
            
            if echo "$OUTPUT" | grep -qi "already exists\|successfully attached\|success"; then
              if echo "$OUTPUT" | grep -qi "already exists"; then
                echo "  ✓ Already attached (verified)"
                ALREADY_ATTACHED=$((ALREADY_ATTACHED + 1))
              else
                echo "  ✅ Successfully attached"
                SUCCESS_COUNT=$((SUCCESS_COUNT + 1))
              fi
            else
              echo "  ⚠️ Warning: $OUTPUT"
              FAILED_COUNT=$((FAILED_COUNT + 1))
              FAILED_DOMAINS+=("$domain")
            fi
          done
          
          echo ""
          echo "📊 Attachment Summary:"
          echo "  ✅ Newly attached: $SUCCESS_COUNT"
          echo "  ✓ Already attached: $ALREADY_ATTACHED"
          echo "  ⚠️ Failed: $FAILED_COUNT"
          echo "  📦 Total domains: ${#DOMAINS[@]}"
          
          if [ $FAILED_COUNT -gt 0 ]; then
            echo ""
            echo "⚠️ Failed domains:"
            printf '  - %s\n' "${FAILED_DOMAINS[@]}"
          fi
          
          TOTAL_OK=$((SUCCESS_COUNT + ALREADY_ATTACHED))
          if [ $TOTAL_OK -eq ${#DOMAINS[@]} ]; then
            echo ""
            echo "::notice::✅ All ${#DOMAINS[@]} custom domains verified!"
          elif [ $TOTAL_OK -gt 0 ]; then
            echo "::warning::Partial success: $TOTAL_OK/${#DOMAINS[@]} domains OK"
          else
            echo "::error::No domains attached successfully!"
            exit 1
          fi
          
          echo "::endgroup::"
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CF_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CF_ACCOUNT_ID }}

      - name: 🔍 Verify domain status
        run: |
          echo "::group::Domain Verification"
          echo "🔍 Listing all attached domains..."
          
          bunx wrangler domains list || echo "::warning::Could not list domains"
          
          echo "::endgroup::"
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CF_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CF_ACCOUNT_ID }}

      - name: 🧪 Post-deployment smoke test
        run: |
          echo "::group::Smoke Test"
          
          WORKER_URL="https://hoshiyomi.qzz.io"
          echo "🔗 Testing fresh worker at: $WORKER_URL"
          
          # Test with retries (fresh worker might need warmup)
          MAX_TEST_RETRIES=5
          TEST_RETRY=0
          SUCCESS=false
          
          while [ $TEST_RETRY -lt $MAX_TEST_RETRIES ]; do
            echo "🔄 Test attempt $((TEST_RETRY + 1))/$MAX_TEST_RETRIES..."
            
            # Test root endpoint
            HTTP_CODE=$(curl -s -o /dev/null -w "%{http_code}" "$WORKER_URL/" --max-time 10 || echo "000")
            echo "📡 Root endpoint: HTTP $HTTP_CODE"
            
            # Test API endpoint
            API_CODE=$(curl -s -o /dev/null -w "%{http_code}" "$WORKER_URL/api/v1/myip" --max-time 10 || echo "000")
            echo "📡 API endpoint: HTTP $API_CODE"
            
            if [ "$HTTP_CODE" -ge 200 ] && [ "$HTTP_CODE" -lt 500 ] && [ "$API_CODE" -eq 200 ]; then
              echo "✅ Worker is responding correctly!"
              SUCCESS=true
              
              # Show actual response
              RESPONSE=$(curl -s "$WORKER_URL/api/v1/myip" --max-time 10 || echo "{}")
              echo "📊 API Response: $RESPONSE"
              break
            else
              TEST_RETRY=$((TEST_RETRY + 1))
              if [ $TEST_RETRY -lt $MAX_TEST_RETRIES ]; then
                echo "⏳ Worker warming up, retrying in 5 seconds..."
                sleep 5
              fi
            fi
          done
          
          if [ "$SUCCESS" = false ]; then
            echo "::error::Worker failed smoke test after $MAX_TEST_RETRIES attempts"
            echo "::error::Manual verification required at: $WORKER_URL"
            exit 1
          fi
          
          echo "::notice::✅ Smoke test passed!"
          echo "::endgroup::"

      - name: 🔬 Test WebSocket connection (optional)
        continue-on-error: true
        run: |
          echo "::group::WebSocket Test"
          echo "🔗 Testing WebSocket upgrade capability..."
          
          # Test WebSocket endpoint with proxy path
          WS_CODE=$(curl -s -o /dev/null -w "%{http_code}" \
            -H "Upgrade: websocket" \
            -H "Connection: Upgrade" \
            -H "Sec-WebSocket-Version: 13" \
            -H "Sec-WebSocket-Key: dGhlIHNhbXBsZSBub25jZQ==" \
            "https://hoshiyomi.qzz.io/1.1.1.1-443" \
            --max-time 10 || echo "000")
          
          if [ "$WS_CODE" -eq 101 ]; then
            echo "✅ WebSocket upgrade successful (HTTP $WS_CODE)"
          elif [ "$WS_CODE" -eq 426 ] || [ "$WS_CODE" -eq 400 ]; then
            echo "⚠️ WebSocket test inconclusive (HTTP $WS_CODE) - may need client test"
          else
            echo "::warning::WebSocket test: HTTP $WS_CODE"
          fi
          
          echo "::endgroup::"

      - name: ✅ Deployment complete
        run: |
          echo "::notice::🎉 Clean deployment successful!"
          echo "::notice::🌿 Branch: ${{ github.ref_name }}"
          echo "::notice::📝 Commit: ${{ github.sha }}"
          echo "::notice::🔗 Primary URL: https://hoshiyomi.qzz.io"
          echo "::notice::🌐 All custom domains: ACTIVE"
          echo "::notice::♻️ Fresh worker instance with cleared state"
          echo "::notice::🔌 Connection pool: Reset"
          echo "::notice::💾 Cache: Cleared"
