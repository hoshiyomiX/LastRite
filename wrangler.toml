name = "last-rite"
main = "_worker.js"
compatibility_date = "2024-09-23"
compatibility_flags = ["nodejs_compat_v2"]

# KV Cache for DNS + Data Persistence (CONFIGURED)
[[kv_namespaces]]
binding = "KV_CACHE"
id = "a9f61fcc3abf48af91a5924027ee1a1a"

# Custom domains
routes = [
  { pattern = "hoshiyomi.qzz.io", custom_domain = true },
  { pattern = "hoshiyomi.web.id", custom_domain = true },
  { pattern = "belajar.ruangguru.com.hoshiyomi.qzz.io", custom_domain = true },
  { pattern = "api24-normal.tiktokv.com.hoshiyomi.qzz.io", custom_domain = true }
]

# Enable logs temporarily for debugging
[observability.logs]
enabled = true
invocation_logs = true
