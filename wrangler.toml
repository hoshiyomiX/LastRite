name = "last-rite"
main = "_worker.js"
compatibility_date = "2024-09-23"
compatibility_flags = ["nodejs_compat_v2"]

# KV Cache for DNS + Data Persistence (CONFIGURED)
[[kv_namespaces]]
binding = "KV_CACHE"
id = "a9f61fcc3abf48af91a5924027ee1a1a"

# Custom domains - attach manually via Cloudflare Dashboard
# Workers & Pages > last-rite > Settings > Triggers > Custom Domains
routes = [
  { pattern = "hoshiyomi.web.id", custom_domain = true }
]

# Enable logs for debugging
[observability]
  [observability.logs]
  enabled = true
  invocation_logs = true
