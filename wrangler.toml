name = "last-rite"
main = "_worker.js"
compatibility_date = "2024-09-23"
compatibility_flags = ["nodejs_compat_v2"]

# KV Cache for DNS + Data Persistence (CONFIGURED)
[[kv_namespaces]]
binding = "KV_CACHE"
id = "a9f61fcc3abf48af91a5924027ee1a1a"

# Custom Domains Configuration
# NOTE: Custom domains harus di-attach manual via:
# 1. Cloudflare Dashboard: Workers & Pages > last-rite > Settings > Triggers > Custom Domains
# 2. Or via CLI: wrangler domains add hoshiyomi.qzz.io
#
# Domain list:
# - hoshiyomi.qzz.io
# - hoshiyomi.web.id  
# - belajar.ruangguru.com.hoshiyomi.qzz.io
# - api24-normal.tiktokv.com.hoshiyomi.qzz.io

# Enable logs for debugging
[observability]
  [observability.logs]
  enabled = true
  invocation_logs = true
