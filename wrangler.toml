name = "last-rite"
main = "_worker.js"
compatibility_date = "2024-09-23"
compatibility_flags = ["nodejs_compat_v2"]

# KV Cache for DNS + Data Persistence (CONFIGURED)
[[kv_namespaces]]
binding = "KV_CACHE"
id = "a9f61fcc3abf48af91a5924027ee1a1a"

# Custom Domains via Routes
# REQUIREMENT: Domains must be added to Cloudflare DNS first
# Format: pattern = "domain/*" with zone_name
[[routes]]
pattern = "hoshiyomi.qzz.io/*"
zone_name = "qzz.io"

[[routes]]
pattern = "hoshiyomi.web.id/*"
zone_name = "web.id"

[[routes]]
pattern = "belajar.ruangguru.com.hoshiyomi.qzz.io/*"
zone_name = "qzz.io"

[[routes]]
pattern = "api24-normal.tiktokv.com.hoshiyomi.qzz.io/*"
zone_name = "qzz.io"

# Enable logs for debugging
[observability]
  [observability.logs]
  enabled = true
  invocation_logs = true
