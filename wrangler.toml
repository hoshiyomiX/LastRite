name = "last-rite"
main = "_worker.js"
compatibility_date = "2024-09-23"
compatibility_flags = ["nodejs_compat_v2"]

# KV Cache for DNS + Data Persistence (CONFIGURED)
[[kv_namespaces]]
binding = "KV_CACHE"
id = "a9f61fcc3abf48af91a5924027ee1a1a"

# Custom Domains via Routes
# Only include domains where zone exists in Cloudflare account

# qzz.io zone routes (if zone exists in account)
[[routes]]
pattern = "hoshiyomi.qzz.io/*"
zone_name = "qzz.io"

[[routes]]
pattern = "belajar.ruangguru.com.hoshiyomi.qzz.io/*"
zone_name = "qzz.io"

[[routes]]
pattern = "api24-normal.tiktokv.com.hoshiyomi.qzz.io/*"
zone_name = "qzz.io"

# Removed routes (zone not found in account):
# - hoshiyomi.web.id/* (zone 'web.id' not available)

# Worker default URL: https://last-rite.workers.dev

# Observability
[observability]
  [observability.logs]
  enabled = true
  invocation_logs = true
